<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ຕັ້ງຄ່າລະບົບ - ບັນທຶກເວລາ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/api-config.js"></script>
    <script src="js/translations.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Lao', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2f 100%); padding: 16px; }
        .glass-container {
            max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px;
            padding: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h1 { color: white; font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        h1 a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 20px; }
        .input-group { margin-bottom: 20px; }
        label { color: rgba(255,255,255,0.8); display: block; margin-bottom: 8px; font-size: 14px; }
        input, button {
            width: 100%; padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: #00ffff; }
        button {
            background: linear-gradient(135deg, #00b4d8, #0077b6); border: none; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 8px;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button.secondary { background: #4b5563; }
        .info-text { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 4px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.4); text-decoration: none; }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>
            <a href="index.html">←</a> 
            <span id="page-title">ຕັ້ງຄ່າລະບົບ</span>
        </h1>
        
        <div class="input-group">
            <label for="apiUrl" id="apiUrl-label">URL ຂອງ Google Apps Script</label>
            <input type="url" id="apiUrl" placeholder="https://script.google.com/.../exec" value="">
            <div class="info-text" id="apiUrl-info">ຕ້ອງກົງກັບໃນ js/api-config.js</div>
        </div>
        
        <button id="getLocationBtn" class="secondary">📍 <span id="getLocation-text">ດຶງຕຳແໜ່ງປັດຈຸບັນ</span></button>
        
        <div class="input-group">
            <label for="latitude" id="lat-label">ເສັ້ນຂະໜານ</label>
            <input type="number" step="any" id="latitude" placeholder="13.7563">
        </div>
        
        <div class="input-group">
            <label for="longitude" id="lng-label">ເສັ້ນແວງ</label>
            <input type="number" step="any" id="longitude" placeholder="100.5018">
        </div>
        
        <div class="input-group">
            <label for="radius" id="radius-label">ຣັດສະໝີທີ່ອະນຸຍາດ (ກິໂລແມັດ)</label>
            <input type="number" step="0.01" id="radius" placeholder="0.1" value="0.1">
            <div class="info-text" id="radius-info">ຖ້າໃສ່ 0 ຈະຂ້າມການກວດ GPS</div>
        </div>
        
        <button id="saveConfigBtn">💾 <span id="saveConfig-text">ບັນທຶກການຕັ້ງຄ່າທັງໝົດ</span></button>
        <button id="fetchConfigBtn" class="secondary">🔄 <span id="fetchConfig-text">ດຶງຂໍ້ມູນການຕັ້ງຄ່າ</span></button>
        
        <a href="index.html" class="back-link">← ກັບໄປໜ້າຫຼັກ</a>
    </div>

    <script>
        // ຕັ້ງຄ່າ API URL ຈາກ api-config.js ລົງໃນ input
        document.getElementById('apiUrl').value = GAS_API_URL;
        
        // ດຶງຕຳແໜ່ງປັດຈຸບັນ
        document.getElementById('getLocationBtn').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        document.getElementById('latitude').value = pos.coords.latitude;
                        document.getElementById('longitude').value = pos.coords.longitude;
                    },
                    (err) => {
                        alert(t('alert.locationPermission'));
                    }
                );
            } else {
                alert('GPS ບໍ່ຮອງຮັບ');
            }
        });
        
        // ບັນທຶກການຕັ້ງຄ່າ
        document.getElementById('saveConfigBtn').addEventListener('click', async () => {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);
            const radius = parseFloat(document.getElementById('radius').value);
            
            if (!apiUrl || isNaN(latitude) || isNaN(longitude) || isNaN(radius)) {
                alert('ກະລຸນາປ້ອນຂໍ້ມູນໃຫ້ຄົບຖ້ວນ');
                return;
            }
            
            const data = {
                action: 'saveConfig',
                targetLat: latitude,
                targetLng: longitude,
                radius: radius
            };
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                alert(t('config.saveSuccess'));
                
                // ຖ້າມີການປ່ຽນ apiUrl ກໍ່ຄວນບັນທຶກໃສ່ localStorage ຫຼື ອັບເດດ api-config.js?
                // ແຕ່ api-config.js ເປັນໄຟລ໌ static, ດັ່ງນັ້ນອາດຈະຕ້ອງໃຫ້ຜູ້ໃຊ້ແກ້ເອງ
            } catch (error) {
                alert(t('config.saveError'));
                console.error(error);
            }
        });
        
        // ດຶງຂໍ້ມູນການຕັ້ງຄ່າ
        document.getElementById('fetchConfigBtn').addEventListener('click', async () => {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            if (!apiUrl) return;
            
            try {
                const response = await fetch(`${apiUrl}?action=getConfig`);
                const data = await response.json();
                
                if (data) {
                    document.getElementById('latitude').value = data.targetLat || '';
                    document.getElementById('longitude').value = data.targetLng || '';
                    document.getElementById('radius').value = data.radius || '';
                }
            } catch (error) {
                alert(t('config.loadError'));
                console.error(error);
            }
        });
        
        // ຕັ້ງຄ່າຂໍ້ຄວາມ
        document.getElementById('page-title').innerText = t('config.title');
        document.getElementById('apiUrl-label').innerText = t('config.apiUrl');
        document.getElementById('getLocation-text').innerText = t('config.currentLocation');
        document.getElementById('lat-label').innerText = t('config.latitude');
        document.getElementById('lng-label').innerText = t('config.longitude');
        document.getElementById('radius-label').innerText = t('config.radius');
        document.getElementById('saveConfig-text').innerText = t('config.saveConfig');
        document.getElementById('fetchConfig-text').innerText = t('config.fetchConfig');
        document.getElementById('radius-info').innerText = t('config.radiusZero');
    </script>
</body>
</html>
