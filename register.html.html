<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ລົງທະບຽນພະນັກງານ - ບັນທຶກເວລາ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/translations.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Lao', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2f 100%); padding: 16px; }
        .glass-container {
            max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px;
            padding: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h1 { color: white; font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        h1 a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 20px; }
        .input-group { margin-bottom: 20px; }
        label { color: rgba(255,255,255,0.8); display: block; margin-bottom: 8px; font-size: 14px; }
        input, button {
            width: 100%; padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: #00ffff; }
        button {
            background: linear-gradient(135deg, #00b4d8, #0077b6); border: none; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 8px;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .video-container {
            position: relative; width: 100%; border-radius: 20px; overflow: hidden;
            border: 2px solid rgba(0, 255, 255, 0.3); margin: 20px 0;
        }
        video, canvas {
            width: 100%; height: auto; display: block; transform: scaleX(-1);
        }
        canvas { position: absolute; top: 0; left: 0; }
        .step-guide {
            background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin: 16px 0;
            color: rgba(255,255,255,0.7); font-size: 14px;
        }
        .step-guide p { margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        .face-count { color: #00ffff; font-weight: 600; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .button-group button { flex: 1; }
        .status { color: rgba(255,255,255,0.6); text-align: center; margin: 10px 0; font-size: 14px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.4); text-decoration: none; }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>
            <a href="index.html">←</a> 
            <span id="page-title">ລົງທະບຽນພະນັກງານໃໝ່</span>
        </h1>
        
        <div class="input-group">
            <label for="name" id="name-label">ຊື່ ແລະ ນາມສະກຸນ</label>
            <input type="text" id="name" placeholder="ຕົວຢ່າງ: ທະນົງສັກ ສຸລິຍະ">
        </div>
        
        <div class="step-guide">
            <p>1️⃣ <span id="step1">ເບິ່ງກົງໄປທີ່ກ້ອງ ແລ້ວກົດ "ບັນທຶກໃບໜ້າ"</span></p>
            <p>2️⃣ <span id="step2">ຫັນໜ້າໄປທາງຊ້າຍເລັກນ້ອຍ ແລ້ວກົດ "ບັນທຶກເພີ່ມ"</span></p>
            <p>3️⃣ <span id="step3">ຫັນໜ້າໄປທາງຂວາເລັກນ້ອຍ ແລ້ວກົດ "ບັນທຶກເພີ່ມ"</span></p>
        </div>
        
        <div class="video-container">
            <video id="video" autoplay muted></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="status" id="status">ກຳລັງໂຫຼດ AI Model...</div>
        <div class="face-count" id="faceCount">ຈຳນວນໃບໜ້າທີ່ບັນທຶກແລ້ວ: 0</div>
        
        <div class="button-group">
            <button id="captureBtn" disabled>📸 ບັນທຶກໃບໜ້າ</button>
            <button id="addMoreBtn" disabled>➕ ບັນທຶກເພີ່ມ</button>
        </div>
        
        <button id="registerBtn" disabled>✅ ລົງທະບຽນ</button>
        <a href="index.html" class="back-link">← ກັບໄປໜ້າຫຼັກ</a>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let statusEl = document.getElementById('status');
        let faceCountEl = document.getElementById('faceCount');
        
        let descriptors = [];
        let modelsLoaded = false;
        let isCapturing = false;
        
        // ໂຫຼດ AI Models
        async function loadModels() {
            statusEl.innerText = 'ກຳລັງໂຫຼດ AI Model...';
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
                modelsLoaded = true;
                statusEl.innerText = 'ພ້ອມໃຊ້ງານ';
                startCamera();
            } catch (error) {
                statusEl.innerText = 'ໂຫຼດ AI Model ບໍ່ສຳເລັດ';
                console.error(error);
            }
        }
        
        // ເປີດກ້ອງ
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    document.getElementById('captureBtn').disabled = false;
                };
            } catch (error) {
                statusEl.innerText = t('register.cameraError');
                console.error(error);
            }
        }
        
        // ບັນທຶກໃບໜ້າ
        async function captureFace() {
            if (!modelsLoaded || isCapturing) return;
            
            isCapturing = true;
            statusEl.innerText = t('register.capturing');
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const detection = await faceapi.detectSingleFace(canvas)
                .withFaceLandmarks()
                .withFaceDescriptor();
            
            if (detection) {
                descriptors.push(detection.descriptor);
                faceCountEl.innerText = t('register.faceCount', { count: descriptors.length });
                
                // ແຕ້ມກອບໃສ່ໃບໜ້າ
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const dims = { width: canvas.width, height: canvas.height };
                const resizedDetection = detection.detection.forSize(dims.width, dims.height);
                faceapi.draw.drawDetections(canvas, resizedDetection);
                
                if (descriptors.length >= 3) {
                    document.getElementById('registerBtn').disabled = false;
                }
                if (descriptors.length >= 1) {
                    document.getElementById('addMoreBtn').disabled = false;
                }
                statusEl.innerText = t('success');
            } else {
                statusEl.innerText = 'ບໍ່ພົບໃບໜ້າ, ກະລຸນາລອງໃໝ່';
            }
            
            isCapturing = false;
        }
        
        // ລົງທະບຽນ
        async function register() {
            const name = document.getElementById('name').value.trim();
            if (!name) {
                alert(t('register.nameRequired'));
                return;
            }
            if (descriptors.length < 3) {
                alert(t('register.minFaces'));
                return;
            }
            
            // ສະເລ່ຍ descriptors ເພື່ອຄວາມຖືກຕ້ອງ (ຫຼື ສົ່ງຫຼາຍອັນກໍ່ໄດ້)
            // ແຕ່ໃນທີ່ນີ້ຈະສົ່ງແບບ array ໄປ
            const data = {
                action: 'registerUser',
                name: name,
                descriptors: descriptors.map(d => Array.from(d)) // ປ່ຽນ Float32Array ເປັນ array ທຳມະດາ
            };
            
            try {
                statusEl.innerText = 'ກຳລັງບັນທຶກ...';
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // ສຳລັບ GAS ອາດຈະຕ້ອງໃຊ້ no-cors ຫຼື ຈັດການ CORS
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                // ຖ້າໃຊ້ no-cors ຈະບໍ່ສາມາດອ່ານ response ໄດ້
                alert(t('register.registerSuccess'));
                window.location.href = 'index.html';
            } catch (error) {
                alert(t('register.registerError'));
                console.error(error);
                statusEl.innerText = t('error');
            }
        }
        
        // Event listeners
        document.getElementById('captureBtn').addEventListener('click', captureFace);
        document.getElementById('addMoreBtn').addEventListener('click', captureFace);
        document.getElementById('registerBtn').addEventListener('click', register);
        
        // ເລີ່ມຕົ້ນ
        loadModels();
        
        // ຕັ້ງຄ່າຂໍ້ຄວາມພາສາລາວ (ຖ້າບໍ່ໄດ້ໃຊ້ t() ໃນ HTML)
        document.getElementById('page-title').innerText = t('register.title');
        document.getElementById('name-label').innerText = t('register.nameLabel');
        document.getElementById('step1').innerText = t('register.step1');
        document.getElementById('step2').innerText = t('register.step2');
        document.getElementById('step3').innerText = t('register.step3');
        document.getElementById('captureBtn').innerHTML = '📸 ' + t('register.saveFace');
        document.getElementById('addMoreBtn').innerHTML = '➕ ' + t('register.addMore');
        document.getElementById('registerBtn').innerHTML = '✅ ' + t('register.register');
    </script>
</body>
</html>
